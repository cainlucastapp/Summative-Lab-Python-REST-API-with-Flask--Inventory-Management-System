<section id="add-item" class="section">
    <h2>Add Item</h2>
    <div class="form-group">
        <input type="text" id="add-name" placeholder="Product Name">
        <input type="text" id="add-brand" placeholder="Brand">
        <input type="text" id="add-barcode" placeholder="Barcode">
        <input type="text" id="add-categories" placeholder="Categories">
        <input type="text" id="add-grades" placeholder="Nutrition Grade">
        <input type="number" id="add-price" placeholder="Price">
        <input type="number" id="add-stock" placeholder="Stock">
        <input type="text" id="add-ingredients" placeholder="Ingredients" class="full-width">
        <input type="text" id="add-image-url" placeholder="Image URL" class="full-width">
    </div>
    <button class="btn btn-primary" onclick="addItem()">Add Item</button>
    <p id="add-message" class="message"></p>
</section>
