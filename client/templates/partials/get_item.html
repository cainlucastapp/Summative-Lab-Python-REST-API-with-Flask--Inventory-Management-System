<section id="get-item" class="section">
    <h2>Get Item</h2>
    <div class="search-bar">
        <input type="text" id="lookup-input" placeholder="Barcode or product name">
        <button class="btn btn-primary" onclick="lookupItem()">Search API</button>
    </div>
    <div id="lookup-result">
        <img id="lookup-image" src="" alt="Product Image" style="display:none;">
        <div class="table-wrapper">
            <table id="lookup-table" style="display:none;">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Brand</th>
                        <th>Categories</th>
                        <th>Nutrition Grade</th>
                    </tr>
                </thead>
                <tbody id="lookup-list"></tbody>
            </table>
        </div>
        <div id="lookup-import" style="display:none;">
            <input type="number" id="lookup-price" placeholder="Price">
            <input type="number" id="lookup-stock" placeholder="Stock">
            <button class="btn btn-orange" onclick="importItem()">Add to Inventory</button>
        </div>
        <p id="lookup-message" class="message"></p>
        <p id="lookup-loading" style="display:none;">⏳ Fetching from OpenFoodFacts...</p>
    </div>
</section>
